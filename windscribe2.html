<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windscribe Live Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #0f172a;
}

#map {
    height: 100vh;
    width: 100vw;
}

.leaflet-popup-content-wrapper {
    background: #1e293b;
    color: #f1f5f9;
    border-radius: 8px;
    border: 1px solid #334155;
}

.leaflet-popup-tip {
    background: #1e293b;
}

.city-title {
    font-family: sans-serif;
    font-size: 14px;
    font-weight: bold;
    color: #38bdf8;
    border-bottom: 1px solid #334155;
    margin-bottom: 5px;
    padding-bottom: 2px;
}

.country-label {
    font-family: sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 8px;
}

.server-pill {
    background: #334155;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    display: inline-block;
    margin: 2px;
    border: 1px solid #475569;
    font-family: sans-serif;
    cursor: pointer;
}

.server-pill.active {
    background: #0ea5e9;
    border-color: #38bdf8;
}

.server-info {
    margin-top: 6px;
}
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ---------------- MAP ----------------

const map = L.map('map', { zoomControl: false }).setView([20, 0], 3);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; CARTO'
}).addTo(map);

// ---------------- CITY COORDS ----------------

const cityCoords = {/* your full coords here exactly as before */};

// ---------------- HELPERS ----------------

function norm(str) {
    return (str || "").toLowerCase().trim();
}

function makeKey(city, nickname) {
    return (city + " - " + nickname).toLowerCase().trim();
}

// ---------------- LOAD DATA ----------------

Promise.all([
    fetch('windscribe_locations.json').then(r => r.json()),
    fetch('https://psr.net.sh/windscribe.php').then(r => r.json())
])
.then(([geo, stats]) => {

    const statsIndex = {};

    for (const loc of Object.values(stats.data.locations)) {
        for (const pop of loc.pops || []) {
            statsIndex[norm(pop.name)] = {
                usage: parseFloat(pop.usage || 0),
                speed: parseFloat(pop.link_speed || 0),
                p2p: pop.is_p2p,
                premium: loc.premium_only
            };
        }
    }

    geo.locations.forEach(loc => {

        const cityGroups = {};

        (loc.cities || []).forEach(c => {
            if (!cityGroups[c.name]) cityGroups[c.name] = [];
            cityGroups[c.name].push(c.nickname);
        });

        for (const [city, nicknames] of Object.entries(cityGroups)) {

            const latLng = cityCoords[city];
            if (!latLng) continue;

            const marker = L.circleMarker(latLng, {
                radius: 6,
                fillColor: "#0ea5e9",
                color: "#fff",
                weight: 1,
                fillOpacity: 0.8
            }).addTo(map);

            // build per-server stats
            const servers = nicknames.map(nick => {
                const key = makeKey(city, nick);
                const stat = statsIndex[key] || {};

                return {
                    name: nick,
                    usage: stat.usage || 0,
                    speed: stat.speed || 0,
                    p2p: stat.p2p === 1,
                    premium: stat.premium === 1
                };
            });

            // unique id per popup
            const popupId = "popup_" + Math.random().toString(36).substring(2, 9);

            const tabs = servers.map((s, i) => `
                <span class="server-pill ${i===0?'active':''}" 
                    onclick="switchTab('${popupId}', ${i})">
                    ${s.name}
                </span>
            `).join('');

            const contentBlocks = servers.map((s, i) => `
                <div class="server-info" id="${popupId}_${i}" style="display:${i===0?'block':'none'}">
                    <span class="server-pill">${(s.speed/1000).toFixed(2)} Gbps</span>
                    <span class="server-pill">${s.p2p ? "P2P" : "No P2P"}</span>
                    <span class="server-pill">${s.premium ? "Premium" : "Free"}</span>
                    <span class="server-pill">${s.usage.toFixed(2)}% load</span>
                </div>
            `).join('');

            marker.bindPopup(`
                <div class="city-title">${city}</div>
                <div class="country-label">${loc.country}</div>
                <div>${tabs}</div>
                ${contentBlocks}
            `);
        }
    });

});

// ---------------- TAB SWITCH ----------------

function switchTab(id, index) {
    const parent = document.querySelector(`[id^="${id}_"]`).parentElement;

    parent.querySelectorAll('.server-info').forEach((el, i) => {
        el.style.display = (i === index) ? 'block' : 'none';
    });

    parent.querySelectorAll('.server-pill').forEach((el, i) => {
        if (i < parent.querySelectorAll('.server-info').length) {
            el.classList.toggle('active', i === index);
        }
    });
}

</script>
</body>
</html>
