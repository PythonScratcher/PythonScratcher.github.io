<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windscribe Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body, html {
    margin: 0;
    height: 100%;
    background: #0f172a;
    font-family: sans-serif;
}

#map {
    height: 100vh;
}

/* controls */
.controls {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #1e293b;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #334155;
    z-index: 1000;
    color: #e2e8f0;
    font-size: 12px;
}

.controls label {
    display: block;
    margin-top: 6px;
}

/* popup */
.leaflet-popup-content-wrapper {
    background: #1e293b;
    color: #f1f5f9;
}

.server-pill {
    background: #334155;
    padding: 2px 6px;
    margin: 2px;
    border-radius: 6px;
    display: inline-block;
}
</style>
</head>

<body>

<div class="controls">
    <label>
        Type:
        <select id="typeFilter">
            <option value="all">All</option>
            <option value="free">Free only</option>
            <option value="premium">Premium only</option>
        </select>
    </label>

    <label>
        P2P only:
        <input type="checkbox" id="p2pFilter">
    </label>

    <label>
        Max Usage (%):
        <input type="range" id="usageFilter" min="0" max="100" value="100">
        <span id="usageVal">100</span>
    </label>

    <label>
        Min Speed (Gbps):
        <input type="range" id="speedFilter" min="0" max="10" value="0" step="0.5">
        <span id="speedVal">0</span>
    </label>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ---------------- MAP ----------------
const map = L.map('map').setView([20,0],3);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// ---------------- CITY COORDS ----------------
const cityCoords = {
            "Atlanta": [33.749, -84.388], "Denver": [39.739, -104.990], "Kansas City": [39.099, -94.578], "Houston": [29.760, -95.369], "Dallas": [32.776, -96.797],
            "Tampa": [27.950, -82.457], "Chicago": [41.878, -87.629], "Buffalo": [42.886, -78.878], "Orlando": [28.538, -81.379], "Boston": [42.360, -71.058],
            "Cleveland": [41.499, -81.694], "New York": [40.712, -74.006], "New Jersey": [40.058, -74.405], "Miami": [25.761, -80.191], "Washington DC": [38.907, -77.036],
            "Charlotte": [35.227, -80.843], "Detroit": [42.331, -83.045], "Ashburn": [39.043, -77.487], "Philadelphia": [39.952, -75.165], "South Bend": [41.676, -86.251],
            "Raleigh": [35.779, -78.638], "Los Angeles": [34.052, -118.243], "San Francisco": [37.774, -122.419], "Seattle": [47.606, -122.332], "Salt Lake City": [40.760, -111.891],
            "Bend": [44.058, -121.315], "Honolulu": [21.306, -157.858], "San Jose": [37.338, -121.886], "Phoenix": [33.448, -112.074], "Las Vegas": [36.171, -115.139], "Santa Clara": [37.354, -121.955],
            "Toronto": [43.653, -79.383], "Montreal": [45.501, -73.567], "Halifax": [44.648, -63.575], "Vancouver": [49.282, -123.120], "Calgary": [51.044, -114.071], "Winnipeg": [49.895, -97.138],
            "Vienna": [48.208, 16.373], "Brussels": [50.850, 4.351], "Sofia": [42.697, 23.321], "Zagreb": [45.815, 15.981], "Limassol": [34.675, 33.041], "Nicosia": [35.185, 33.382],
            "Prague": [50.075, 14.437], "Copenhagen": [55.676, 12.568], "Tallinn": [59.437, 24.753], "Helsinki": [60.169, 24.938], "Paris": [48.856, 2.352], "Bordeaux": [44.837, -0.579], "Marseille": [43.296, 5.369],
            "Frankfurt": [50.110, 8.682], "Berlin": [52.520, 13.404], "Athens": [37.983, 23.727], "Budapest": [47.497, 19.040], "Reykjavik": [64.146, -21.942], "Dublin": [53.349, -6.260],
            "Ashdod": [31.804, 34.655], "Milan": [45.464, 9.189], "Palermo": [38.115, 13.361], "Riga": [56.949, 24.105], "Vilnius": [54.687, 25.279], "Luxembourg": [49.611, 6.131],
            "Chisinau": [47.010, 28.863], "Amsterdam": [52.367, 4.904], "Skopje": [41.997, 21.428], "Oslo": [59.913, 10.752], "Gdansk": [54.352, 18.646], "Warsaw": [52.229, 21.011],
            "Lisbon": [38.722, -9.139], "Bucharest": [44.426, 26.102], "Bratislava": [48.148, 17.106], "Madrid": [40.416, -3.703], "Barcelona": [41.385, 2.173], "Stockholm": [59.329, 18.068],
            "Zurich": [47.376, 8.541], "London": [51.507, -0.127], "Manchester": [53.480, -2.242], "Edinburgh": [55.953, -3.188], "Tirana": [41.327, 19.818], "Sarajevo": [43.856, 18.413],
            "Novi Travnik": [44.170, 17.658], "Tbilisi": [41.715, 44.827], "Mumbai": [19.076, 72.877], "Fake Mumbai": [18.921, 72.834], "New Delhi": [28.613, 77.209], "Nairobi": [-1.292, 36.821],
            "Lagos": [6.524, 3.379], "Moscow": [55.755, 37.617], "Fake St Petersburg": [59.934, 30.335], "Belgrade": [44.786, 20.448], "Ljubljana": [46.056, 14.505], "Johannesburg": [-26.204, 28.047],
            "Istanbul": [41.008, 28.978], "Kyiv": [50.450, 30.523], "Melbourne": [-37.813, 144.963], "Sydney": [-33.868, 151.209], "Perth": [-31.950, 115.860], "Brisbane": [-27.470, 153.021],
            "Adelaide": [-34.928, 138.600], "Auckland": [-36.848, 174.763], "Hong Kong": [22.319, 114.169], "Surabaya": [-7.257, 112.752], "Jakarta": [-6.208, 106.845], "Bali": [-8.409, 115.188],
            "Tokyo": [35.676, 139.650], "Kuala Lumpur": [3.139, 101.686], "Manila": [14.599, 120.984], "Singapore": [1.352, 103.819], "Seoul": [37.566, 126.978], "Taipei": [25.033, 121.565],
            "Bangkok": [13.756, 100.501], "Dubai": [25.204, 55.270], "Hanoi": [21.028, 105.834], "Buenos Aires": [-34.603, -58.381], "Sao Paulo": [-23.550, -46.633], "Santiago": [-33.448, -70.667],
            "Bogota": [4.711, -74.072], "Quito": [-0.180, -78.467], "San Salvador": [13.692, -89.218], "Guatemala City": [14.634, -90.506], "Queretaro": [20.588, -100.389], "Panama City": [8.982, -79.519],
            "Asuncion": [-25.263, -57.575], "Lima": [-12.046, -77.042], "Montevideo": [-34.901, -56.164], "Nuuk York": [64.183, -51.721]
        };


// ---------------- HELPERS ----------------
function norm(s){ return (s||"").toLowerCase().trim(); }
function makeKey(c,n){ return (c+" - "+n).toLowerCase(); }

// usage → color (dark = high usage)
function usageToColor(u){
    const val = Math.max(0, Math.min(100, u));
    const light = 70 - (val * 0.4);
    return `hsl(200, 80%, ${light}%)`;
}

// ---------------- STATE ----------------
let allMarkers = [];

// ---------------- LOAD ----------------
Promise.all([
    fetch('windscribe_locations.json').then(r=>r.json()),
    fetch('https://psr.net.sh/windscribe.php').then(r=>r.json())
]).then(([geo, stats]) => {

    const statsIndex = {};

    for (const loc of Object.values(stats.data.locations)) {
        for (const pop of loc.pops || []) {
            statsIndex[norm(pop.name)] = {
                usage: parseFloat(pop.usage||0),
                speed: parseFloat(pop.link_speed||0),
                p2p: pop.is_p2p === 1,
                premium: pop.is_premium === 1,
                status: pop.status
            };
        }
    }

    geo.locations.forEach(loc => {

        const groups = {};
        loc.cities.forEach(c=>{
            if(!groups[c.name]) groups[c.name]=[];
            groups[c.name].push(c.nickname);
        });

        for(const [city,nicks] of Object.entries(groups)){

            const coords = cityCoords[city];
            if(!coords) continue;

            const servers = nicks.map(n=>{
                const s = statsIndex[makeKey(city,n)] || {};
                return {
                    name:n,
                    usage:s.usage||0,
                    speed:(s.speed||0)/1000,
                    p2p:s.p2p||false,
                    premium:s.premium||false,
                    status:s.status ?? 1
                };
            });

            // aggregate
            const avgUsage = servers.reduce((a,b)=>a+b.usage,0)/servers.length;
            const hasFree = servers.some(s=>!s.premium);
            const hasP2P = servers.some(s=>s.p2p);
            const maxSpeed = Math.max(...servers.map(s=>s.speed));
            const hasDown = servers.some(s=>s.status===0);

            const marker = L.circleMarker(coords, {
                radius:6,
                fillColor: hasDown ? "#ef4444" : usageToColor(avgUsage),
                color: hasFree ? "#22c55e" : "#ffffff",
                weight:2,
                fillOpacity:0.9
            });

            marker.meta = {
                hasFree, hasP2P, avgUsage, maxSpeed
            };

            marker.bindPopup(`
                <b>${city}</b><br>
                ${servers.map(s=>`
                    <div class="server-pill">
                        ${s.name} |
                        ${s.speed.toFixed(2)} Gbps |
                        ${s.usage.toFixed(1)}% |
                        ${s.p2p ? "P2P" : "No P2P"} |
                        ${s.premium ? "Premium" : "Free"}
                    </div>
                `).join('')}
            `);

            marker.addTo(map);
            allMarkers.push(marker);
        }
    });

    applyFilters();
});

// ---------------- FILTERS ----------------

function applyFilters(){

    const type = document.getElementById('typeFilter').value;
    const p2p = document.getElementById('p2pFilter').checked;
    const maxUsage = +document.getElementById('usageFilter').value;
    const minSpeed = +document.getElementById('speedFilter').value;

    allMarkers.forEach(m=>{
        const meta = m.meta;

        let show = true;

        if(type==="free" && !meta.hasFree) show=false;
        if(type==="premium" && meta.hasFree) show=false;
        if(p2p && !meta.hasP2P) show=false;
        if(meta.avgUsage > maxUsage) show=false;
        if(meta.maxSpeed < minSpeed) show=false;

        if(show){
            m.addTo(map);
        } else {
            map.removeLayer(m);
        }
    });
}

// ---------------- UI ----------------

document.getElementById('typeFilter').onchange = applyFilters;
document.getElementById('p2pFilter').onchange = applyFilters;

document.getElementById('usageFilter').oninput = e=>{
    document.getElementById('usageVal').textContent = e.target.value;
    applyFilters();
};

document.getElementById('speedFilter').oninput = e=>{
    document.getElementById('speedVal').textContent = e.target.value;
    applyFilters();
};

</script>

</body>
</html>
