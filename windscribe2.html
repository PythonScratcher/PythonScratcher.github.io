<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windscribe Live Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #0f172a;
}

#map {
    height: 100vh;
    width: 100vw;
}

.leaflet-popup-content-wrapper {
    background: #1e293b;
    color: #f1f5f9;
    border-radius: 8px;
    border: 1px solid #334155;
}

.leaflet-popup-tip {
    background: #1e293b;
}

.city-title {
    font-family: sans-serif;
    font-size: 14px;
    font-weight: bold;
    color: #38bdf8;
    border-bottom: 1px solid #334155;
    margin-bottom: 5px;
    padding-bottom: 2px;
}

.country-label {
    font-family: sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 8px;
}

.server-pill {
    background: #334155;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    display: inline-block;
    margin: 2px;
    border: 1px solid #475569;
    font-family: sans-serif;
    cursor: pointer;
}

.server-pill.active {
    background: #0ea5e9;
    border-color: #38bdf8;
}

.server-info {
    margin-top: 6px;
}
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ---------------- MAP ----------------

const map = L.map('map', { zoomControl: false }).setView([20, 0], 3);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; CARTO'
}).addTo(map);

// ---------------- CITY COORDS ----------------

            "Tampa": [27.950, -82.457], "Chicago": [41.878, -87.629], "Buffalo": [42.886, -78.878], "Orlando": [28.538, -81.379], "Boston": [42.360, -71.058],

            "Raleigh": [35.779, -78.638], "Los Angeles": [34.052, -118.243], "San Francisco": [37.774, -122.419], "Seattle": [47.606, -122.332], "Salt Lake City": [40.760, -111.891],

            "Prague": [50.075, 14.437], "Copenhagen": [55.676, 12.568], "Tallinn": [59.437, 24.753], "Helsinki": [60.169, 24.938], "Paris": [48.856, 2.352], "Bordeaux": [44.837, -0.579], "Marseille": [43.296, 5.369],
            "Frankfurt": [50.110, 8.682], "Berlin": [52.520, 13.404], "Athens": [37.983, 23.727], "Budapest": [47.497, 19.040], "Reykjavik": [64.146, -21.942], "Dublin": [53.349, -6.260],

            "Lagos": [6.524, 3.379], "Moscow": [55.755, 37.617], "Fake St Petersburg": [59.934, 30.335], "Belgrade": [44.786, 20.448], "Ljubljana": [46.056, 14.505], "Johannesburg": [-26.204, 28.047],
            "Istanbul": [41.008, 28.978], "Kyiv": [50.450, 30.523], "Melbourne": [-37.813, 144.963], "Sydney": [-33.868, 151.209], "Perth": [-31.950, 115.860], "Brisbane": [-27.470, 153.021],

            "Tokyo": [35.676, 139.650], "Kuala Lumpur": [3.139, 101.686], "Manila": [14.599, 120.984], "Singapore": [1.352, 103.819], "Seoul": [37.566, 126.978], "Taipei": [25.033, 121.565],
            "Bangkok": [13.756, 100.501], "Dubai": [25.204, 55.270], "Hanoi": [21.028, 105.834], "Buenos Aires": [-34.603, -58.381], "Sao Paulo": [-23.550, -46.633], "Santiago": [-33.448, -70.667],
            "Bogota": [4.711, -74.072], "Quito": [-0.180, -78.467], "San Salvador": [13.692, -89.218], "Guatemala City": [14.634, -90.506], "Queretaro": [20.588, -100.389], "Panama City": [8.982, -79.519],
            "Asuncion": [-25.263, -57.575], "Lima": [-12.046, -77.042], "Montevideo": [-34.901, -56.164], "Nuuk York": [64.183, -51.721]
        };

// ---------------- HELPERS ----------------

function norm(str) {
    return (str || "").toLowerCase().trim();
}

function makeKey(city, nickname) {
    return (city + " - " + nickname).toLowerCase().trim();
}

// ---------------- LOAD DATA ----------------

Promise.all([
    fetch('windscribe_locations.json').then(r => r.json()),
    fetch('https://psr.net.sh/windscribe.php').then(r => r.json())
])
.then(([geo, stats]) => {

    const statsIndex = {};

    for (const loc of Object.values(stats.data.locations)) {
        for (const pop of loc.pops || []) {
            statsIndex[norm(pop.name)] = {
                usage: parseFloat(pop.usage || 0),
                speed: parseFloat(pop.link_speed || 0),
                p2p: pop.is_p2p,
                premium: pop.is_premium
            };
        }
    }

    geo.locations.forEach(loc => {

        const cityGroups = {};

        (loc.cities || []).forEach(c => {
            if (!cityGroups[c.name]) cityGroups[c.name] = [];
            cityGroups[c.name].push(c.nickname);
        });

        for (const [city, nicknames] of Object.entries(cityGroups)) {

            const latLng = cityCoords[city];
            if (!latLng) continue;

            const marker = L.circleMarker(latLng, {
                radius: 6,
                fillColor: "#0ea5e9",
                color: "#fff",
                weight: 1,
                fillOpacity: 0.8
            }).addTo(map);

            // build per-server stats
            const servers = nicknames.map(nick => {
                const key = makeKey(city, nick);
                const stat = statsIndex[key] || {};

                return {
                    name: nick,
                    usage: stat.usage || 0,
                    speed: stat.speed || 0,
                    p2p: stat.p2p === 1,
                    premium: stat.premium === 1
                };
            });

            // unique id per popup
            const popupId = "popup_" + Math.random().toString(36).substring(2, 9);

            const tabs = servers.map((s, i) => `
                <span class="server-pill ${i===0?'active':''}" 
                    onclick="switchTab('${popupId}', ${i})">
                    ${s.name}
                </span>
            `).join('');

            const contentBlocks = servers.map((s, i) => `
                <div class="server-info" id="${popupId}_${i}" style="display:${i===0?'block':'none'}">
                    <span class="server-pill">${(s.speed/1000).toFixed(2)} Gbps</span>
                    <span class="server-pill">${s.p2p ? "P2P" : "No P2P"}</span>
                    <span class="server-pill">${s.premium ? "Premium" : "Free"}</span>
                    <span class="server-pill">${s.usage.toFixed(2)}% load</span>
                </div>
            `).join('');

            marker.bindPopup(`
                <div class="city-title">${city}</div>
                <div class="country-label">${loc.country}</div>
                <div>${tabs}</div>
                ${contentBlocks}
            `);
        }
    });

});

// ---------------- TAB SWITCH ----------------

function switchTab(id, index) {
    const parent = document.querySelector(`[id^="${id}_"]`).parentElement;

    parent.querySelectorAll('.server-info').forEach((el, i) => {
        el.style.display = (i === index) ? 'block' : 'none';
    });

    parent.querySelectorAll('.server-pill').forEach((el, i) => {
        if (i < parent.querySelectorAll('.server-info').length) {
            el.classList.toggle('active', i === index);
        }
    });
}

</script>
</body>
</html>
