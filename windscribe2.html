<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windscribe Live Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: #0f172a;
    }

    #map {
        height: 100vh;
        width: 100vw;
    }

    .leaflet-popup-content-wrapper {
        background: #1e293b;
        color: #f1f5f9;
        border-radius: 8px;
        border: 1px solid #334155;
    }

    .leaflet-popup-tip {
        background: #1e293b;
    }

    .city-title {
        font-family: sans-serif;
        font-size: 14px;
        font-weight: bold;
        color: #38bdf8;
        border-bottom: 1px solid #334155;
        margin-bottom: 5px;
        padding-bottom: 2px;
    }

    .country-label {
        font-family: sans-serif;
        font-size: 10px;
        text-transform: uppercase;
        color: #94a3b8;
        margin-bottom: 8px;
    }

    .server-pill {
        background: #334155;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        display: inline-block;
        margin: 2px 2px 0 0;
        border: 1px solid #475569;
        font-family: sans-serif;
    }
</style>
</head>

<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ---------------- MAP ----------------

const map = L.map('map', { zoomControl: false }).setView([20, 0], 3);

L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; CARTO'
}).addTo(map);

// ---------------- HELPERS ----------------

function norm(str) {
    return (str || "").toLowerCase().trim();
}

function makeKey(city, nickname) {
    return (city + " - " + nickname).toLowerCase().trim();
}

// fallback so nothing disappears
let fallbackIndex = 0;
function fallbackCoords() {
    const lat = (Math.sin(fallbackIndex) * 140) % 80;
    const lng = (Math.cos(fallbackIndex) * 360) % 180;
    fallbackIndex++;
    return [lat, lng];
}

// ---------------- LOAD DATA ----------------

Promise.all([
    fetch('windscribe_locations.json').then(r => r.json()),
    fetch('https://psr.net.sh/windscribe.php').then(r => r.json())
])
.then(([geo, stats]) => {

    const locations = geo.locations;
    const statsLocations = stats.data.locations;

    // ---------------- BUILD STATS INDEX ----------------
    const statsIndex = {};

    for (const loc of Object.values(statsLocations)) {
        for (const pop of loc.pops || []) {

            const key = pop.name.toLowerCase().trim();

            statsIndex[key] = {
                usage: parseFloat(pop.usage || 0),
                speed: parseFloat(pop.link_speed || 0),
                p2p: pop.is_p2p,
                premium: loc.premium_only
            };
        }
    }

    // ---------------- BUILD MAP ----------------

    locations.forEach(loc => {

        const cityGroups = {};

        (loc.cities || []).forEach(c => {
            if (!cityGroups[c.name]) cityGroups[c.name] = [];
            cityGroups[c.name].push(c.nickname);
        });

        for (const [city, nicknames] of Object.entries(cityGroups)) {

            const latLng = fallbackCoords(); // keep safe even if missing coords
            const marker = L.circleMarker(latLng, {
                radius: 6,
                fillColor: "#0ea5e9",
                color: "#fff",
                weight: 1,
                fillOpacity: 0.8
            }).addTo(map);

            // ---------------- MATCH STATS ----------------
            const statsList = nicknames.map(nick => {
                const key = makeKey(city, nick);
                return statsIndex[key];
            }).filter(Boolean);

            const avgUsage = statsList.length
                ? statsList.reduce((a, b) => a + b.usage, 0) / statsList.length
                : 0;

            const maxSpeed = statsList.length
                ? Math.max(...statsList.map(s => s.speed))
                : 0;

            const hasP2P = statsList.some(s => s.p2p === 1);
            const isFree = statsList.some(s => s.premium === 0);

            const speedGbps = (maxSpeed / 1000).toFixed(2);

            marker.bindPopup(`
                <div class="city-title">${city}</div>
                <div class="country-label">${loc.country || "Unknown"}</div>

                <div>
                    <span class="server-pill">⚡ ${speedGbps} Gbps</span>
                    <span class="server-pill">${hasP2P ? "P2P OK" : "No P2P"}</span>
                    <span class="server-pill">${isFree ? "Free" : "Premium"}</span>
                    <span class="server-pill">📊 ${avgUsage.toFixed(2)}%</span>
                </div>
            `);
        }
    });

})
.catch(err => console.error("Load failed:", err));

</script>
</body>
</html>
